services:
  evidence-pack-api:
    build: .
    image: evidence-pack-generator:latest
    command: ["api"]
    init: true
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: info
      WORKERS: 1
    ports:
      - "8000:8000"

  evidence-pack-generator:
    image: evidence-pack-generator:latest
    command: ["generate", "--input", "/input", "--output", "/output"]
    profiles: ["batch"]
    volumes:
      - ./examples/basic:/input
      - ./output:/output
