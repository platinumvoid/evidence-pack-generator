services:
  evidence-pack-api:
    build: .
    image: evidence-pack-generator:latest
    command: ["api"]
    init: true
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: info
      WORKERS: 1
    ports:
      - "8000:8000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  evidence-pack-generator:
    image: evidence-pack-generator:latest
    command: ["generate", "--input", "/input", "--output", "/output"]
    profiles: ["batch"]
    volumes:
      - ./examples/basic:/input
      - ./output:/output
